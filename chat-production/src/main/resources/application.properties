# Server
server.port=8080

# ==========================================
# SQL Server Configuration (THAY ĐOẠN H2 BẰNG ĐOẠN NÀY)
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=RealtimeChatProduction;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
# (Hãy thay sa và 123456 bằng tài khoản SQL Server của bạn nếu khác nhé)

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tắt tự động thêm dấu gạch dưới của Hibernate (QUAN TRỌNG)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Spring Servlet Multipart Config (Upload File)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB