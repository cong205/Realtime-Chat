<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Realtime Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Realtime Chat</h1>
      <div id="header-controls">
        <button id="btn-toggle-sidebar" class="icon-btn" aria-label="Toggle menu">☰</button>
        <button id="btn-theme" class="icon-btn" aria-label="Toggle theme">🌙</button>
        <div id="auth-area">
          <button id="btn-login" class="btn">Login</button>
          <button id="btn-register" class="btn btn-outline">Register</button>
          <button id="btn-logout" class="btn" style="display:none">Logout</button>
        </div>
      </div>
    </header>

    <main>
      <aside id="sidebar-left">
        <div class="control">
          <input id="searchUsers" placeholder="Search users..." />
        </div>
        <div id="searchResults" class="search-results"></div>
        <div id="conversations"></div>
        <div class="control">
            <button id="btn-new-conversation">New Group</button>
        </div>
      </aside>

      <section id="chat-area">
        <div id="chat-header">Select a conversation</div>
        <div id="messages"></div>
        <div id="composer">
          <input id="messageInput" placeholder="Type a message..." />
          <input id="fileInput" type="file" />
          <button id="btn-send">Send</button>
        </div>
      </section>

      <aside id="sidebar-right">
        <div id="profile">
          <h3>Profile</h3>
          <div id="profileInfo">Not logged in</div>
        </div>
        <div id="friends">
          <h3>Friends</h3>
          <div id="friendsList"></div>
        </div>
        <div id="notifications">
          <h3>Notifications</h3>
          <div id="notificationsList"></div>
        </div>
      </aside>
    </main>
  </div>

  <!-- Login/Register modals (simple) -->
  <div id="modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3 id="modalTitle">Login</h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button id="modalSubmit">Submit</button>
        <button id="modalClose">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script src="/js/main.js" defer></script>
</body>
</html>
